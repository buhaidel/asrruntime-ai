<!DOCTYPE html>
<html>

<head>

  <title>ASR Reply Classification</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .company {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .classification {
      color:#22c55e;
      margin-bottom:8px;
    }

    .signal {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Reply Classification</h1>

<div id="replies"></div>

<script>

async function loadReplies() {

  const response = await fetch('/api/reply-classification.json');

  const data = await response.json();

  const container = document.getElementById('replies');

  container.innerHTML = '';

  data.reply_states.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="company">${item.company}</div>
      <div class="classification">${item.classification}</div>
      <div class="signal">${item.signal_strength}</div>
    `;

    container.appendChild(div);

  });

}

loadReplies();

</script>

</body>

</html>
