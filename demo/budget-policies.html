<!DOCTYPE html>
<html>

<head>

  <title>ASR Agent Budget Policies</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .policy {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .limit {
      color:#22c55e;
      margin-bottom:8px;
    }

    .action {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Agent Budget Policies</h1>

<div id="policies"></div>

<script>

async function loadPolicies() {

  const response = await fetch('/api/budget-policies.json');

  const data = await response.json();

  const container = document.getElementById('policies');

  container.innerHTML = '';

  data.budget_policies.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="policy">${item.policy}</div>
      <div class="limit">limit: ${item.limit}</div>
      <div class="action">${item.action}</div>
    `;

    container.appendChild(div);

  });

}

loadPolicies();

</script>

</body>

</html>
