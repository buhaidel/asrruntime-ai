<!DOCTYPE html>
<html>

<head>

  <title>ASR Economic Event Journal</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .event {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .status {
      color:#22c55e;
      margin-bottom:8px;
    }

    .amount {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Economic Event Journal</h1>

<div id="events"></div>

<script>

async function loadEvents() {

  const response = await fetch('/api/economic-events.json');

  const data = await response.json();

  const container = document.getElementById('events');

  container.innerHTML = '';

  data.economic_events.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="event">${item.event}</div>
      <div class="status">${item.status}</div>
      <div class="amount">${item.amount} ${item.currency}</div>
    `;

    container.appendChild(div);

  });

}

loadEvents();

</script>

</body>

</html>
