<!DOCTYPE html>
<html>

<head>

  <title>ASR Validation Operations</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .company {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .stage {
      color:#22c55e;
      margin-bottom:8px;
    }

    .next {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Validation Operations</h1>

<div id="validation"></div>

<script>

async function loadValidation() {

  const response = await fetch('/api/validation-operations.json');

  const data = await response.json();

  const container = document.getElementById('validation');

  container.innerHTML = '';

  data.validation_pipeline.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="company">${item.company}</div>
      <div class="stage">${item.stage}</div>
      <div class="next">${item.next_step}</div>
    `;

    container.appendChild(div);

  });

}

loadValidation();

</script>

</body>

</html>
