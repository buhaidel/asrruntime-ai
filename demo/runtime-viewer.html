<!DOCTYPE html>
<html>
<head>
  <title>ASR Runtime Viewer</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 40px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .actor {
      color: #38bdf8;
      font-size: 22px;
      font-weight: bold;
    }

    .event {
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>ASR Dynamic Runtime Viewer</h1>

<div id="timeline"></div>

<script>
fetch('/api/trace_demo_invoice_001.json')
  .then(response => response.json())
  .then(data => {

    const timeline = document.getElementById('timeline');

    data.actors.forEach(item => {

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="actor">${item.actor}</div>
        <div class="event">${item.event}</div>
      `;

      timeline.appendChild(card);

    });

  });
</script>

</body>
</html>
