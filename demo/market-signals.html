<!DOCTYPE html>
<html>

<head>

  <title>ASR Market Signals</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .signal {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .strength {
      color:#22c55e;
      margin-bottom:8px;
    }

    .source {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Market Signals</h1>

<div id="signals"></div>

<script>

async function loadSignals() {

  const response = await fetch('/api/market-signals.json');

  const data = await response.json();

  const container = document.getElementById('signals');

  container.innerHTML = '';

  data.market_signals.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="signal">${item.signal}</div>
      <div class="strength">${item.strength}</div>
      <div class="source">${item.source}</div>
    `;

    container.appendChild(div);

  });

}

loadSignals();

</script>

</body>

</html>
