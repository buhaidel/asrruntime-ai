<!DOCTYPE html>
<html>
<head>
  <title>ASR Mutation Switcher</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 30px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 20px;
      margin-right: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .label {
      color: #94a3b8;
      font-size: 14px;
    }

    .value {
      font-size: 24px;
      margin-top: 8px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<h1>ASR Mutation Switcher</h1>

<button onclick="loadState('mutation-state.json')">
Healthy State
</button>

<button onclick="loadState('mutation-state-2.json')">
Degraded State
</button>
<button onclick="loadState('mutation-state-3.json')">
Critical Failure
</button>
<button onclick="loadState('mutation-state-4.json')">
Recovery State
</button>
<div id="dashboard"></div>

<script>

function render(data) {

  const dashboard = document.getElementById('dashboard');

  dashboard.innerHTML = '';

  const fields = [
    ['Runtime Cycle', data.runtime_cycle],
    ['Runtime Status', data.runtime_status],
    ['Replay Engine', data.replay_engine],
    ['Validator Status', data.validator_status],
    ['Trace Integrity', data.trace_integrity],
    ['Active Traces', data.active_traces],
    ['Mutation State', data.mutation_state],
    ['Diagnostic Confidence', data.diagnostic_confidence]
  ];

  fields.forEach(item => {

    const card = document.createElement('div');

    card.className = 'card';

    card.innerHTML = `
      <div class="label">${item[0]}</div>
      <div class="value">${item[1]}</div>
    `;

    dashboard.appendChild(card);

  });

}

function loadState(file) {

  fetch('/api/' + file)
    .then(response => response.json())
    .then(data => render(data));

}

loadState('mutation-state.json');

</script>

</body>
</html>
