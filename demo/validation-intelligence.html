<!DOCTYPE html>
<html>

<head>

  <title>ASR Validation Intelligence</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .signal {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .priority {
      color:#22c55e;
      margin-bottom:8px;
    }

    .focus {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Validation Intelligence</h1>

<div id="intelligence"></div>

<script>

async function loadIntelligence() {

  const response = await fetch('/api/validation-intelligence.json');

  const data = await response.json();

  const container = document.getElementById('intelligence');

  container.innerHTML = '';

  data.validation_intelligence.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="signal">${item.signal}</div>
      <div class="priority">${item.priority}</div>
      <div class="focus">${item.recommended_focus}</div>
    `;

    container.appendChild(div);

  });

}

loadIntelligence();

</script>

</body>

</html>
