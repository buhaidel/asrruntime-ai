<!DOCTYPE html>
<html>

<head>
  <title>ASR Runtime Journal Viewer</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .event {
      color:#38bdf8;
      font-size:18px;
      margin-bottom:8px;
    }

    .status {
      color:#22c55e;
      margin-bottom:6px;
    }

    .timestamp {
      color:#94a3b8;
      font-size:14px;
    }

  </style>

</head>

<body>

<h1>ASR Runtime Journal Viewer</h1>

<div id="journal"></div>

<script>

async function loadJournal() {

  try {

    const response = await fetch('/api/runtime-journal.jsonl');

    const text = await response.text();

    const lines = text.trim().split('\\n');

    const container = document.getElementById('journal');

    container.innerHTML = '';

    lines.reverse().slice(0, 20).forEach(line => {

      try {

        const item = JSON.parse(line);

        const div = document.createElement('div');

        div.className = 'entry';

        div.innerHTML = `
          <div class="event">${item.event}</div>
          <div class="status">${item.status}</div>
          <div class="timestamp">${item.timestamp || 'runtime-active'}</div>
        `;

        container.appendChild(div);

      } catch(err) {}

    });

  } catch(err) {

    console.error(err);

  }

}

loadJournal();

setInterval(loadJournal, 5000);

</script>

</body>

</html>
