<!DOCTYPE html>
<html>
<head>
  <title>ASR Runtime Journal Viewer</title>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .event {
      color:#38bdf8;
      font-size:18px;
      margin-bottom:8px;
    }

    .status {
      color:#22c55e;
      margin-bottom:6px;
    }

    .timestamp {
      color:#94a3b8;
      font-size:14px;
    }

  </style>
</head>

<body>

<h1>ASR Runtime Journal Viewer</h1>



<div class="entry">
  <div class="event">replay_initialized</div>
  <div class="status">active</div>
  <div class="timestamp">continuity verified</div>
</div>

<div class="entry">
  <div class="event">verification_engine</div>
  <div class="status">trusted</div>
  <div class="timestamp">integrity scoring active</div>
</div>

</body>
</html>
