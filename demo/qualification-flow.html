<!DOCTYPE html>
<html>

<head>

  <title>ASR Design Partner Qualification</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .company {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .pain {
      color:#22c55e;
      margin-bottom:8px;
    }

    .status {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Design Partner Qualification</h1>

<div id="qualification"></div>

<script>

async function loadQualification() {

  const response = await fetch('/api/design-partner-qualification.json');

  const data = await response.json();

  const container = document.getElementById('qualification');

  container.innerHTML = '';

  data.qualification_candidates.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="company">${item.company}</div>
      <div class="pain">replay pain: ${item.replay_pain}</div>
      <div class="pain">integration complexity: ${item.integration_complexity}</div>
      <div class="status">${item.qualification_status}</div>
    `;

    container.appendChild(div);

  });

}

loadQualification();

</script>

</body>

</html>
