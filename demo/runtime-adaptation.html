<!DOCTYPE html>
<html>

<head>

  <title>ASR Runtime Adaptation</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .trigger {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .response {
      color:#22c55e;
      margin-bottom:8px;
    }

    .status {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Runtime Adaptation</h1>

<div id="adaptation"></div>

<script>

async function loadAdaptation() {

  const response = await fetch('/api/runtime-adaptation.json');

  const data = await response.json();

  const container = document.getElementById('adaptation');

  container.innerHTML = '';

  data.runtime_adaptation.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="trigger">${item.trigger}</div>
      <div class="response">${item.runtime_response}</div>
      <div class="status">${item.status}</div>
    `;

    container.appendChild(div);

  });

}

loadAdaptation();

</script>

</body>

</html>
