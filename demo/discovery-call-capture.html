<!DOCTYPE html>
<html>

<head>

  <title>ASR Discovery Call Capture</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .company {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .status {
      color:#22c55e;
      margin-bottom:8px;
    }

    .notes {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Discovery Call Capture</h1>

<div id="calls"></div>

<script>

async function loadCalls() {

  const response = await fetch('/api/discovery-call-log.json');

  const data = await response.json();

  const container = document.getElementById('calls');

  container.innerHTML = '';

  data.discovery_calls.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="company">${item.company}</div>
      <div class="status">${item.status}</div>
      <div class="notes">${item.notes}</div>
    `;

    container.appendChild(div);

  });

}

loadCalls();

</script>

</body>

</html>
