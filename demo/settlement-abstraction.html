<!DOCTYPE html>
<html>

<head>

  <title>ASR Settlement Abstraction</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .card {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .title {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .value {
      color:#22c55e;
    }

  </style>

</head>

<body>

<h1>ASR Settlement Abstraction</h1>

<div id="settlement"></div>

<script>

async function loadSettlement() {

  const response = await fetch('/api/settlement-abstraction.json');

  const data = await response.json();

  const s = data.settlement_abstraction;

  const container = document.getElementById('settlement');

  container.innerHTML += `
    <div class="card">
      <div class="title">Mode</div>
      <div class="value">${s.mode}</div>
    </div>
  `;

  container.innerHTML += `
    <div class="card">
      <div class="title">Status</div>
      <div class="value">${s.status}</div>
    </div>
  `;

  container.innerHTML += `
    <div class="card">
      <div class="title">Supported Settlement Models</div>
      <div class="value">${s.supported_settlement_models.join('<br>')}</div>
    </div>
  `;

  container.innerHTML += `
    <div class="card">
      <div class="title">Principles</div>
      <div class="value">${s.principles.join('<br>')}</div>
    </div>
  `;

}

loadSettlement();

</script>

</body>

</html>
