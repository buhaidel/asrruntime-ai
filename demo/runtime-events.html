<!DOCTYPE html>
<html>
<head>
  <title>ASR Runtime Event Stream</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 30px;
    }

    .event {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .event-id {
      color: #38bdf8;
      font-size: 20px;
      font-weight: bold;
    }

    .event-type {
      margin-top: 10px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .event-status {
      margin-top: 8px;
      font-size: 16px;
      color: #22c55e;
    }

  </style>
</head>

<body>

<h1>ASR Runtime Event Stream</h1>

<div id="events"></div>

<script>

fetch('/api/runtime-events.json')
  .then(response => response.json())
  .then(data => {

    const container = document.getElementById('events');

    data.events.forEach(event => {

      const div = document.createElement('div');

      div.className = 'event';

      div.innerHTML = `
        <div class="event-id">${event.event_id}</div>

        <div class="event-type">
          ${event.type}
        </div>

        <div class="event-type">
          Actor: ${event.actor}
        </div>

        <div class="event-type">
          Trace: ${event.trace_id}
        </div>

        <div class="event-status">
          Status: ${event.status}
        </div>
      `;

      container.appendChild(div);

    });

  });

</script>

</body>
</html>
