<!DOCTYPE html>
<html>
<head>
  <title>ASR Evidence Feed</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 30px;
    }

    .report {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .trace {
      font-size: 22px;
      color: #38bdf8;
      font-weight: bold;
    }

    .status {
      margin-top: 10px;
      font-size: 18px;
    }

    .summary {
      margin-top: 12px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

<h1>ASR Runtime Evidence Feed</h1>

<div id="feed"></div>

<script>

fetch('/api/evidence-feed.json')
  .then(response => response.json())
  .then(data => {

    const feed = document.getElementById('feed');

    data.reports.forEach(report => {

      const div = document.createElement('div');

      div.className = 'report';

      div.innerHTML = `
        <div class="trace">${report.trace_id}</div>
        <div class="status">
          Status: ${report.status} | Severity: ${report.severity}
        </div>
        <div class="summary">${report.summary}</div>
      `;

      feed.appendChild(div);

    });

  });

</script>

</body>
</html>
