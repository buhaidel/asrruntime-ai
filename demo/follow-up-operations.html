<!DOCTYPE html>
<html>

<head>

  <title>ASR Follow-up Operations</title>

  <style>

    body {
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:40px;
    }

    h1 {
      font-size:42px;
      margin-bottom:30px;
    }

    .entry {
      background:#111827;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .company {
      color:#38bdf8;
      font-size:22px;
      margin-bottom:10px;
    }

    .state {
      color:#22c55e;
      margin-bottom:8px;
    }

    .action {
      color:#cbd5e1;
    }

  </style>

</head>

<body>

<h1>ASR Follow-up Operations</h1>

<div id="followups"></div>

<script>

async function loadFollowups() {

  const response = await fetch('/api/follow-up-operations.json');

  const data = await response.json();

  const container = document.getElementById('followups');

  container.innerHTML = '';

  data.follow_up_pipeline.forEach(item => {

    const div = document.createElement('div');

    div.className = 'entry';

    div.innerHTML = `
      <div class="company">${item.company}</div>
      <div class="state">${item.state}</div>
      <div class="action">${item.next_action}</div>
    `;

    container.appendChild(div);

  });

}

loadFollowups();

</script>

</body>

</html>
