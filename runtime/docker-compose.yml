services:
  asr-demo:
    image: nginx:latest
    container_name: asr-demo
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - /opt/asr-runtime/demo:/usr/share/nginx/html:ro
      - /opt/asr-runtime/logs:/var/log/asr

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

